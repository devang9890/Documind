services:
  - type: web
    name: documind-backend
    runtime: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: GROQ_API_KEY
        sync: false

      - key: JWT_SECRET
        sync: false

      - key: MONGO_URI
        sync: false

      - key: DATABASE_NAME
        value: documind